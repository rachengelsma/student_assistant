<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student Assistant</title>
<link rel="icon" type="image/png" href="assets/prts-logo-favicon.png" />
<link rel="apple-touch-icon" href="assets/prts-logo-favicon.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
<style>
  :root{
    --prts-red: #DA2037;
    --prts-red-deep: #b81a2d;
    --prts-red-soft: #f9e3e6;
    --ink: #1C1C1C;
    --ink-2: #3a3835;
    --ink-3: #6b6865;
    --ink-4: #9a9794;
    --bg: #fbfaf8;
    --panel: #f4f2ee;
    --panel-hover: #e9e5dd;
    --line: #e8e4dd;
  }
  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; height: 100%; overflow: hidden; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif;}
  button{ font-family: inherit; }

  .app{ display: flex; height: 100%; font-size: 14px; }

  /* =========================== SIDEBAR =========================== */
  .sidebar{
    width: 260px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 14px;
  }
  .sidebar .new{
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 13px; font-weight: 500; cursor: pointer; background: #fff; color: var(--ink);
  }
  .sidebar .new:hover{ background: #fafaf8; }
  .sidebar .sec-label{
    font-family: 'Inter', sans-serif; font-size: 10px; color: var(--ink-3);
    letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 12px 6px; font-weight: 500;
  }
  .sidebar .conv{
    padding: 8px 12px; font-size: 13px; color: var(--ink-2); border-radius: 8px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: relative;
  }
  .sidebar .conv .conv-title{
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar .conv .conv-del{
    opacity: 0; background: transparent; border: 0; padding: 2px;
    color: var(--ink-3); cursor: pointer; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 150ms ease, color 150ms ease, background 150ms ease;
  }
  .sidebar .conv:hover .conv-del{ opacity: 1; }
  .sidebar .conv .conv-del:hover{ color: var(--prts-red); background: rgba(218,32,55,0.08); }
  .sidebar .conv:hover{ background: var(--panel-hover);}
  .sidebar .conv.active{ background: var(--panel-hover); color: var(--ink);}
  .sidebar .empty-recent{
    padding: 8px 12px; font-size: 12px; color: var(--ink-4); font-style: italic;
  }
  .sidebar .foot{
    margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink-2);
  }
  .sidebar .foot .av{
    width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .sidebar .foot.foot-signin{
    cursor: pointer;
    transition: color 150ms ease;
  }
  .sidebar .foot.foot-signin:hover{ color: var(--ink); }
  .sidebar .foot.foot-signin .av{
    background: transparent; border: 1.5px dashed var(--ink-4); color: var(--ink-4);
  }
  .sidebar .foot .name{
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px;
    transition: background 150ms ease;
  }
  .sidebar .foot .name:hover{ background: var(--panel-hover); }
  .sidebar .foot input.name-input{
    flex: 1; min-width: 0; border: 1px solid var(--line); background: #fff;
    border-radius: 6px; padding: 4px 8px; font-size: 13px; color: var(--ink);
    font-family: inherit; outline: none;
  }
  .sidebar .foot input.name-input:focus{ border-color: var(--prts-red); }

  /* =========================== MAIN =========================== */
  .main{ flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;}
  .main-header{
    height: 56px; border-bottom: 1px solid var(--line); background: var(--bg);
    display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0;
  }
  .main-header .logo-s{
    width: 32px; height: 32px; border-radius: 50%; background: var(--prts-red);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .main-header .logo-s img{ width: 72%; height: 72%; object-fit: contain;}
  .main-header .t h4{
    margin: 0; font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  }
  .main-header .t .sub{ font-size: 11px; color: var(--ink-3); margin-top: 1px;}

  /* =========================== EMPTY STATE =========================== */
  #empty-state{
    /* Covers the main area from below the header down to ABOVE the send box
       (~80px tall) so the input stays visible and usable. */
    position: absolute; top: 56px; left: 0; right: 0; bottom: 88px;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 32px;
    pointer-events: auto;
    transition: opacity 260ms ease;
    /* Sit above the Web Chat transcript so chips are actually clickable.
       Without this, WebChat's __filler div intercepts pointer events even
       though it looks transparent. */
    z-index: 10;
    background: var(--bg);
  }
  #empty-state.fade{ opacity: 0; pointer-events: none; z-index: -1;}
  .empty-inner{ max-width: 580px; margin: 0 auto; width: 100%; }
  .empty-inner h1{
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 44px;
    line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 14px;
  }
  .empty-inner h1 em{ font-style: italic; color: var(--prts-red);}
  .empty-inner p{
    margin: 0 0 28px; color: var(--ink-3); font-size: 14.5px; line-height: 1.55;
  }
  .chip-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chip{
    background: #fff; border: 1px solid var(--line); padding: 13px 14px;
    border-radius: 12px; cursor: pointer; font-family: inherit;
    display: flex; align-items: flex-start; gap: 10px; text-align: left;
    transition: border-color 150ms ease, transform 150ms ease;
  }
  .chip:hover{ border-color: var(--prts-red); transform: translateY(-1px);}
  .chip .ico{
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--prts-red-soft); color: var(--prts-red);
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .chip .ct b{ display: block; font-size: 13px; font-weight: 600; margin-bottom: 2px; color: var(--ink);}
  .chip .ct span{ font-size: 12px; color: var(--ink-3); line-height: 1.4;}

  /* =========================== WEBCHAT =========================== */
  #webchat{
    flex: 1; min-height: 0; background: var(--bg);
  }

  /* Hide Web Chat defaults that don't fit the Scholar aesthetic */
  .webchat__basic-transcript{ background: var(--bg) !important; }
  /* Smooth avatars to circles matching our header logo */
  .webchat__bubble--from-user + .webchat__imageAvatar,
  .webchat__imageAvatar { border-radius: 50% !important; }

  /* Bot bubble */
  .webchat__bubble:not(.webchat__bubble--from-user) .webchat__bubble__content{
    background: #fff !important;
    border: 1px solid var(--line) !important;
    border-radius: 16px 16px 16px 4px !important;
    padding: 2px 4px;
  }
  .webchat__bubble:not(.webchat__bubble--from-user) .webchat__text-content__markdown{
    font-family: 'Inter', system-ui, sans-serif !important;
    font-size: 14px !important; line-height: 1.6 !important; color: var(--ink) !important;
  }
  .webchat__bubble--from-user .webchat__bubble__content{
    border-radius: 16px 16px 4px 16px !important;
  }

  /* Send box */
  .webchat__send-box{
    background: var(--bg) !important;
    border-top: 1px solid var(--line) !important;
    padding: 14px 28px 18px !important;
  }
  .webchat__send-box-text-box{
    background: #fff !important;
    border: 1px solid var(--line) !important;
    border-radius: 22px !important;
    max-width: 720px; margin: 0 auto;
  }
  .webchat__send-box-text-box__input{
    font-family: 'Inter', sans-serif !important; font-size: 14px !important; color: var(--ink) !important;
  }
  .webchat__send-box-text-box__input::placeholder{ color: var(--ink-4) !important; }

  /* Transcript width cap */
  .webchat__basic-transcript__scrollable{ padding: 24px 28px 10px !important; }

  /* ============== CITATIONS — style the native <details>/<summary> ============== */
  /* The bot renders sources as <details class="webchat__link-definitions">.
     We force it closed by default and restyle both the summary and list. */
  .webchat__link-definitions{
    margin: 6px 0 0 !important;
    background: transparent !important;
    border: 0 !important;
    box-shadow: none !important;
    padding: 0 !important;
    max-width: 720px;
  }
  .webchat__link-definitions__header{
    list-style: none !important;
    cursor: pointer;
    padding: 4px 0 !important;
    background: transparent !important;
    border: 0 !important;
    display: inline-flex !important;
    align-items: center;
    gap: 5px;
    width: auto !important;
    color: var(--ink-3) !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 11.5px !important;
    letter-spacing: 0.01em;
    transition: color 150ms ease;
  }
  .webchat__link-definitions__header::-webkit-details-marker{ display: none; }
  .webchat__link-definitions__header:hover{ color: var(--prts-red) !important;}
  .webchat__link-definitions__header-text{
    font-weight: 500 !important; color: inherit !important;
    font-family: inherit !important; font-size: inherit !important;
  }
  .webchat__link-definitions__header-filler{ display: none !important;}
  /* Rotate the native chevron SVG */
  .webchat__link-definitions__header svg{
    width: 10px !important; height: 10px !important;
    transition: transform 180ms ease;
    color: currentColor !important;
  }
  .webchat__link-definitions[open] .webchat__link-definitions__header svg{
    transform: rotate(90deg);
  }
  /* The expanded list — restyle cards */
  .webchat__link-definitions__list{
    margin-top: 8px !important;
    background: transparent !important;
    padding: 0 !important;
    border: 0 !important;
    display: flex; flex-direction: column; gap: 6px;
  }
  .webchat__link-definitions__list-item{
    background: transparent !important;
    border: 0 !important;
    padding: 0 !important;
  }
  .webchat__link-definitions__list-item-box{
    background: #fff !important;
    border: 1px solid var(--line) !important;
    border-radius: 10px !important;
    padding: 8px 10px !important;
    width: 100% !important;
    text-align: left !important;
    cursor: pointer;
    transition: border-color 150ms ease;
    display: flex !important;
    align-items: center;
  }
  .webchat__link-definitions__list-item-box:hover{ border-color: var(--prts-red) !important;}
  .webchat__link-definitions__list-item-body{
    display: flex !important; align-items: center; gap: 10px;
    padding: 0 !important; background: transparent !important;
  }
  .webchat__link-definitions__badge{
    width: 18px !important; height: 18px !important;
    background: var(--prts-red-soft) !important;
    color: var(--prts-red) !important;
    border-radius: 4px !important;
    font-size: 10.5px !important; font-weight: 600 !important;
    font-family: 'Fraunces', serif !important;
    display: flex !important; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .webchat__link-definitions__list-item-main-text,
  .webchat__link-definitions__list-item-text{
    font-family: 'Inter', sans-serif !important;
    font-size: 12px !important; color: var(--ink-2) !important;
    line-height: 1.4 !important;
  }

  /* ============== HIDE BUILT-IN TYPING INDICATOR (three dots) ============== */
  /* Copilot Studio renders a typing indicator bubble while the bot is preparing
     its response. We hide it because our own highlighter "thinking…" serves
     the same purpose. */
  .webchat__typing-indicator,
  .webchat__typingIndicator,
  [class*="typing-indicator"],
  [class*="typingIndicator"]{
    display: none !important;
  }

  /* Bot avatar */
  .webchat__imageAvatar,
  .webchat__defaultAvatar{
    background: var(--prts-red) !important;
  }

  /* =========================== THINKING INDICATOR =========================== */
  #sa-thinking{
    position: absolute; left: 0; right: 0; bottom: 88px;
    display: none; justify-content: center;
    pointer-events: none;
    z-index: 5;
  }
  #sa-thinking.on{ display: flex;}
  #sa-thinking .sa-hl{
    font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; color: var(--ink-2);
    position: relative; padding: 2px 2px; line-height: 1.2;
  }
  #sa-thinking .sa-hl::before{
    content: ''; position: absolute; left: -2px; top: 2px; bottom: 2px;
    width: 0; background: rgba(218,32,55,0.16);
    animation: sa-hl-swipe 1.8s ease-in-out infinite;
    z-index: -1; border-radius: 2px;
  }
  #sa-thinking .sa-hl span{ position: relative; z-index: 1;}
  @keyframes sa-hl-swipe {
    0%   { width: 0; left: -2px; }
    50%  { width: calc(100% + 4px); left: -2px; }
    100% { width: 0; left: 100%; }
  }

  /* =========================== TYPEWRITER CARET =========================== */
  .tw-caret{
    display: inline-block;
    width: 0.5em; height: 1em;
    background: var(--ink);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: tw-blink 1s steps(2, start) infinite;
  }
  @keyframes tw-blink{ to{ visibility: hidden; } }

  /* =========================== JUMP-TO-LATEST PILL =========================== */
  .jump-latest{
    position: absolute; left: 50%; bottom: 96px;
    transform: translateX(-50%) translateY(8px);
    background: #fff; color: var(--ink); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 14px 7px 12px;
    font-size: 12.5px; font-weight: 500; cursor: pointer;
    box-shadow: 0 4px 14px rgba(28,28,28,0.10);
    display: flex; align-items: center; gap: 6px;
    opacity: 0; pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 8;
    font-family: inherit;
  }
  .jump-latest.show{
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .jump-latest:hover{ background: var(--bg); border-color: var(--ink-4); }
  .jump-latest svg{ width: 13px; height: 13px; }

  /* =========================== HAMBURGER & SIDEBAR CLOSE =========================== */
  .hamburger{
    display: none; /* desktop: hidden */
    background: transparent; border: 0; padding: 6px;
    cursor: pointer; color: var(--ink-2); border-radius: 6px;
    margin-right: 4px;
    align-items: center; justify-content: center;
  }
  .hamburger:hover{ background: var(--panel-hover); }
  .sidebar-close{
    display: none; /* desktop: hidden */
    background: transparent; border: 0; padding: 6px;
    cursor: pointer; color: var(--ink-3); border-radius: 6px;
    align-items: center; justify-content: center;
  }
  .sidebar-close:hover{ background: var(--panel-hover); color: var(--ink); }
  .sidebar-header{
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 4px;
  }
  .sidebar-header .new{ flex: 1; }

  /* Overlay scrim that appears behind the slide-out sidebar on mobile */
  .sidebar-scrim{
    display: none;
    position: fixed; inset: 0;
    background: rgba(28,28,28,0.4);
    z-index: 50;
    opacity: 0;
    transition: opacity 220ms ease;
  }
  body.sidebar-open .sidebar-scrim{ display: block; opacity: 1; }

  /* =========================== MOBILE (≤768px) =========================== */
  @media (max-width: 768px){
    .app{ display: block; height: 100%; }

    /* Sidebar: off-canvas overlay, slides in from the left */
    .sidebar{
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 84%; max-width: 320px;
      z-index: 60;
      transform: translateX(-100%);
      transition: transform 260ms ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.16);
      padding: 16px;
    }
    body.sidebar-open .sidebar{ transform: translateX(0); }
    .sidebar-close{ display: flex; }

    /* Show hamburger in main header */
    .hamburger{ display: flex; }

    /* Main fills the entire viewport; header sticks at top */
    .main{ height: 100%; }
    .main-header{
      padding: 0 14px; gap: 10px; height: 56px;
    }
    .main-header .t h4{ font-size: 14px; }
    .main-header .t .sub{ font-size: 10.5px; }

    /* Empty state: smaller type, single-column chips, tighter padding */
    #empty-state{
      padding: 0 18px; bottom: 76px;
    }
    .empty-inner h1{ font-size: 30px; line-height: 1.12; margin-bottom: 10px; }
    .empty-inner p{ font-size: 13.5px; margin-bottom: 18px; }
    .chip-grid{ grid-template-columns: 1fr; gap: 8px; }
    .chip{ padding: 11px 12px; }
    .chip .ico{ width: 24px; height: 24px; font-size: 12px; }
    .chip .ct b{ font-size: 13px; }
    .chip .ct span{ font-size: 11.5px; }

    /* Web Chat: match new bottom-bar height */
    #sa-thinking{ bottom: 76px; }

    /* Citations: keep left-aligned with bubble (no avatar offset to worry about) */
    .webchat__link-definitions{ max-width: 100%; }

    /* Bubbles: more breathing room on small screens */
    .webchat__bubble{ max-width: 84vw !important; }
  }
</style>
</head>
<body>
<div class="sidebar-scrim" id="sidebar-scrim"></div>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="new" id="new-chat-btn">
        <span style="display:flex; align-items:center; gap:8px;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          New conversation
      </span>
    </button>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="conv-list"></div>
    <div class="foot" id="user-foot">
      <!-- Populated by JS: either "Set your name" input or avatar + name -->
    </div>
  </aside>

  <!-- MAIN -->
  <section class="main">
    <div class="main-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <div class="logo-s"><img src="assets/prts-logo.png" alt="" /></div>
      <div class="t">
        <h4>Student Assistant</h4>
        <div class="sub">Puritan Reformed Theological Seminary</div>
      </div>
    </div>

    <!-- Empty state (shown until first message sent) -->
    <div id="empty-state">
      <div class="empty-inner">
        <h1><span id="greeting">Good morning</span>.<br/>What do you <em>need</em> to know?</h1>
        <p>I know the student handbook inside and out — ask me about policies, deadlines, the library, housing, chapel, and anything else about life at PRTS.</p>
        <div class="chip-grid">
          <button class="chip" data-prompt="What is the chapel and class attendance policy?"><span class="ico">Aa</span><span class="ct"><b>Attendance policy</b><span>Chapel and class attendance requirements</span></span></button>
          <button class="chip" data-prompt="When do finals start this semester and what is the academic calendar?"><span class="ico">§</span><span class="ct"><b>Academic calendar</b><span>Finals, breaks, and key deadlines</span></span></button>
          <button class="chip" data-prompt="What are the thesis formatting requirements and submission process?"><span class="ico">✎</span><span class="ct"><b>Thesis &amp; papers</b><span>Formatting standards and submission process</span></span></button>
          <button class="chip" data-prompt="Tell me about campus life — housing, dining, and student services."><span class="ico">⌂</span><span class="ct"><b>Campus life</b><span>Housing, dining, and student services</span></span></button>
        </div>
      </div>
    </div>

    <!-- Web Chat mount point -->
    <div id="webchat" role="main"></div>

    <!-- Jump-to-latest pill (appears when user scrolls up while bot is generating) -->
    <button class="jump-latest" id="jump-latest" aria-label="Jump to latest message">
      <svg viewBox="0 0 12 12" fill="none"><path d="M6 2v8m0 0L2.5 6.5M6 10l3.5-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Jump to latest
    </button>
  </section>
</div>

<script>
  // ========= CONFIG =========
  const tokenEndpoint = 'https://default61d6eb67cbe542ee8a1373c46652bd.71.environment.api.powerplatform.com/powervirtualagents/botsbyschema/cr2ce_askAdrian/directline/token?api-version=2022-03-01-preview';

  const styleOptions = {
    accent: '#DA2037',
    backgroundColor: 'transparent',
    bubbleBackground: '#ffffff',
    bubbleBorderColor: '#e8e4dd',
    bubbleBorderRadius: 16,
    bubbleBorderWidth: 1,
    bubbleFromUserBackground: '#1C1C1C',
    bubbleFromUserTextColor: '#ffffff',
    bubbleFromUserBorderRadius: 16,
    bubbleTextColor: '#1C1C1C',
    sendBoxBackground: 'transparent',
    sendBoxTextColor: '#1C1C1C',
    sendBoxBorderTop: 'solid 1px #e8e4dd',
    sendBoxPlaceholderColor: '#9a9794',
    sendBoxButtonColor: '#DA2037',
    sendBoxButtonColorOnHover: '#b81a2d',
    sendBoxButtonColorOnFocus: '#b81a2d',
    sendBoxHeight: 50,
    suggestedActionBackground: 'white',
    suggestedActionBorderColor: '#DA2037',
    suggestedActionBorderRadius: 20,
    suggestedActionTextColor: '#DA2037',
    suggestedActionBorderWidth: 1.5,
    timestampColor: '#9a9794',
    botAvatarBackgroundColor: '#DA2037',
    botAvatarImage: 'assets/prts-logo.png',
    userAvatarBackgroundColor: '#1C1C1C',
    userAvatarInitials: (localStorage.getItem('sa.userName') || '').trim()
      ? (localStorage.getItem('sa.userName').trim().split(/\s+/).filter(Boolean).slice(0,2).map(s => s[0].toUpperCase()).join(''))
      : '•',
    avatarSize: 32,
    avatarBorderRadius: '50%',
    hideUploadButton: true,
    groupTimestamp: 300000,
    rootHeight: '100%',
    rootWidth: '100%'
  };

  /* =========================================================================
     TYPEWRITER — animates new bot bubbles only; preserves markdown & history
     ========================================================================= */
  const CHAR_DELAY_MS = 22;
  const seenBubbles = new WeakSet();
  let existingBubblesSnapshotted = false;

  function isBotBubble(activity) {
    return activity && !activity.querySelector('.webchat__bubble--from-user');
  }

  function hookTypewriter(root) {
    const activities = root.querySelectorAll('.webchat__basic-transcript__activity');
    if (!existingBubblesSnapshotted) {
      activities.forEach(a => {
        const body = a.querySelector('.webchat__text-content__markdown, .webchat__render-markdown--message-activity');
        if (body) seenBubbles.add(body);
      });
      existingBubblesSnapshotted = true;
      return;
    }
    activities.forEach(activity => {
      if (!isBotBubble(activity)) return;
      const body = activity.querySelector('.webchat__text-content__markdown, .webchat__render-markdown--message-activity');
      if (!body) return;
      if (seenBubbles.has(body)) return;
      const txt = (body.textContent || '').trim();
      if (!txt) return;
      seenBubbles.add(body);
      attachTypewriter(body);
    });
  }

  function attachTypewriter(bubble) {
    const chars = [];
    function wrapTextNodes(node) {
      const kids = Array.from(node.childNodes);
      for (const child of kids) {
        if (child.nodeType === Node.TEXT_NODE) {
          const t = child.nodeValue;
          if (!t.length) continue;
          const frag = document.createDocumentFragment();
          for (const ch of t) {
            const s = document.createElement('span');
            s.className = 'tw-ch';
            s.style.display = 'none';
            s.textContent = ch;
            chars.push(s);
            frag.appendChild(s);
          }
          node.replaceChild(frag, child);
        } else if (child.nodeType === Node.ELEMENT_NODE) {
          child.dataset.twHidden = '1';
          child.style.display = 'none';
          wrapTextNodes(child);
        }
      }
    }
    wrapTextNodes(bubble);
    if (!chars.length) return;
    hideThinking();

    let i = 0;
    const caret = document.createElement('span');
    caret.className = 'tw-caret';
    function revealAncestors(span) {
      let n = span.parentNode;
      while (n && n !== bubble) {
        if (n.dataset && n.dataset.twHidden === '1') {
          n.style.display = '';
          delete n.dataset.twHidden;
        }
        n = n.parentNode;
      }
    }
    function placeCaretAfter(span) {
      if (!span || !span.parentNode) return;
      if (caret.parentNode) caret.parentNode.removeChild(caret);
      span.parentNode.insertBefore(caret, span.nextSibling);
    }
    function tick() {
      if (i >= chars.length) {
        if (caret.parentNode) caret.parentNode.removeChild(caret);
        return;
      }
      const s = chars[i];
      revealAncestors(s);
      s.style.display = '';
      placeCaretAfter(s);
      i++;
      setTimeout(tick, CHAR_DELAY_MS);
    }
    tick();
  }

  /* =========================================================================
     THINKING INDICATOR — highlighter sweep over italic serif "thinking..."
     ========================================================================= */
  function ensureThinkingEl() {
    let el = document.getElementById('sa-thinking');
    if (el) return el;
    el = document.createElement('div');
    el.id = 'sa-thinking';
    el.innerHTML = '<span class="sa-hl"><span>thinking…</span></span>';
    document.querySelector('.main').appendChild(el);
    return el;
  }
  function showThinking() { ensureThinkingEl().classList.add('on'); }
  function hideThinking() {
    const el = document.getElementById('sa-thinking');
    if (el) el.classList.remove('on');
  }

  /* =========================================================================
     EMPTY-STATE HANDLING — fade out on first user send, back in on "new chat"
     ========================================================================= */
  const emptyEl = document.getElementById('empty-state');
  let firstMessageSent = false;
  function fadeEmpty() {
    if (firstMessageSent) return;
    firstMessageSent = true;
    emptyEl.classList.add('fade');
  }
  function showEmpty() {
    firstMessageSent = false;
    emptyEl.classList.remove('fade');
  }

  /* =========================================================================
     GREETING — time-of-day aware
     ========================================================================= */
  function updateGreeting() {
    const el = document.getElementById('greeting');
    if (!el) return;
    const h = new Date().getHours();
    let g;
    if (h < 5)       g = 'Up late'; // midnight to 5am
    else if (h < 12) g = 'Good morning';
    else if (h < 17) g = 'Good afternoon';
    else if (h < 21) g = 'Good evening';
    else             g = 'Good evening'; // 9pm-midnight
    // If user has set their name, personalize
    const name = getUserName();
    if (name) {
      const first = name.split(/\s+/)[0];
      el.textContent = `${g}, ${first}`;
    } else {
      el.textContent = g;
    }
  }

  /* =========================================================================
     USER NAME — stored in localStorage; rendered in sidebar footer
     ========================================================================= */
  const USER_KEY = 'sa.userName';
  function getUserName() {
    return (localStorage.getItem(USER_KEY) || '').trim();
  }
  function setUserName(name) {
    const n = (name || '').trim();
    const prev = getUserName();
    if (n) localStorage.setItem(USER_KEY, n);
    else localStorage.removeItem(USER_KEY);
    renderFoot();
    // If the initials actually changed, the Web Chat avatar (baked into
    // styleOptions at render time) needs a reload to pick up the new value.
    if (initials(n) !== initials(prev)) {
      // Small delay so the footer re-render is visible first
      setTimeout(() => location.reload(), 250);
    }
  }
  function initials(name) {
    return name.split(/\s+/).filter(Boolean).slice(0,2).map(s => s[0].toUpperCase()).join('') || '•';
  }
  function renderFoot() {
    const foot = document.getElementById('user-foot');
    foot.innerHTML = '';
    foot.className = 'foot';
    const name = getUserName();
    if (!name) {
      foot.classList.add('foot-signin');
      foot.innerHTML = '<div class="av">+</div><div class="name">Set your name</div>';
      foot.addEventListener('click', showNameInput, { once: true });
    } else {
      const av = document.createElement('div'); av.className = 'av'; av.textContent = initials(name);
      const nm = document.createElement('div'); nm.className = 'name'; nm.textContent = name;
      nm.title = 'Click to edit your name';
      nm.addEventListener('click', showNameInput);
      foot.appendChild(av); foot.appendChild(nm);
    }
    // Keep the greeting in sync with the current name
    updateGreeting();
  }
  function showNameInput() {
    const foot = document.getElementById('user-foot');
    foot.innerHTML = '';
    foot.className = 'foot';
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'name-input';
    input.placeholder = 'Your name'; input.value = getUserName();
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { setUserName(input.value); }
      else if (e.key === 'Escape') { renderFoot(); }
    });
    input.addEventListener('blur', () => setUserName(input.value));
    foot.appendChild(input);
    input.focus(); input.select();
  }

  /* =========================================================================
     CONVERSATION HISTORY — persisted in localStorage
     Each entry: { id, title, firstUserMsg, createdAt, updatedAt }
     We keep the most-recent 20. The active conversation's Direct Line
     conversationId is stored so reloading the page resumes it.
     ========================================================================= */
  const CONVS_KEY = 'sa.convs';
  const ACTIVE_KEY = 'sa.activeConv';
  const MAX_CONVS = 20;

  function loadConvs() {
    try { return JSON.parse(localStorage.getItem(CONVS_KEY) || '[]'); }
    catch { return []; }
  }
  function saveConvs(list) {
    localStorage.setItem(CONVS_KEY, JSON.stringify(list.slice(0, MAX_CONVS)));
  }
  function getActiveConvId() { return localStorage.getItem(ACTIVE_KEY) || null; }
  function setActiveConvId(id) {
    if (id) localStorage.setItem(ACTIVE_KEY, id);
    else localStorage.removeItem(ACTIVE_KEY);
  }
  function upsertConv(partial) {
    const list = loadConvs();
    const idx = list.findIndex(c => c.id === partial.id);
    const now = Date.now();
    if (idx >= 0) {
      list[idx] = { ...list[idx], ...partial, updatedAt: now };
    } else {
      list.unshift({ createdAt: now, updatedAt: now, ...partial });
    }
    // re-sort newest first
    list.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
    saveConvs(list);
    renderConvList();
  }
  function deleteConv(id) {
    const list = loadConvs().filter(c => c.id !== id);
    saveConvs(list);
    if (getActiveConvId() === id) {
      setActiveConvId(null);
      // Start a fresh conversation
      location.reload();
      return;
    }
    renderConvList();
  }

  function groupConvs(list) {
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const weekAgo = startOfDay - 6*24*3600*1000;
    const groups = { Today: [], 'This week': [], Older: [] };
    for (const c of list) {
      if (c.updatedAt >= startOfDay) groups.Today.push(c);
      else if (c.updatedAt >= weekAgo) groups['This week'].push(c);
      else groups.Older.push(c);
    }
    return groups;
  }
  function renderConvList() {
    const host = document.getElementById('conv-list');
    host.innerHTML = '';
    const list = loadConvs();
    const activeId = getActiveConvId();
    if (!list.length) {
      const label = document.createElement('div');
      label.className = 'sec-label'; label.textContent = 'Recent';
      host.appendChild(label);
      const empty = document.createElement('div');
      empty.className = 'empty-recent'; empty.textContent = 'No conversations yet';
      host.appendChild(empty);
      return;
    }
    const groups = groupConvs(list);
    for (const [label, items] of Object.entries(groups)) {
      if (!items.length) continue;
      const h = document.createElement('div');
      h.className = 'sec-label'; h.textContent = label;
      host.appendChild(h);
      for (const c of items) {
        const row = document.createElement('div');
        row.className = 'conv' + (c.id === activeId ? ' active' : '');
        const t = document.createElement('div');
        t.className = 'conv-title'; t.textContent = c.title || 'Untitled';
        row.appendChild(t);
        const del = document.createElement('button');
        del.className = 'conv-del'; del.title = 'Delete conversation';
        del.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1M5 4l1 9a1 1 0 001 1h2a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        del.addEventListener('click', e => {
          e.stopPropagation();
          if (confirm('Delete "' + (c.title || 'this conversation') + '"?')) deleteConv(c.id);
        });
        row.appendChild(del);
        row.addEventListener('click', () => switchToConv(c.id));
        host.appendChild(row);
      }
    }
  }

  function switchToConv(id) {
    const conv = loadConvs().find(c => c.id === id);
    if (!conv) return;
    // Re-ask the first question in a fresh conversation. We mark the chosen
    // conv as "pending replay" so after the page reloads and WebChat mounts,
    // we auto-send the original question.
    sessionStorage.setItem('sa.replay', JSON.stringify({ id, text: conv.firstUserMsg }));
    setActiveConvId(id);
    location.reload();
  }
  function startNewConv() {
    setActiveConvId(null);
    sessionStorage.removeItem('sa.replay');
    location.reload();
  }

  /* =========================================================================
     BEHAVIOR — send-box hooks, chip → send, thinking triggers
     ========================================================================= */
  let sendInput = null;
  let directLineRef = null;

  /* Force the native citations <details> closed by default (Copilot Studio opens it) */
  function collapseCitations(root) {
    root.querySelectorAll('details.webchat__link-definitions').forEach(d => {
      if (d.dataset.saCollapsed === '1') return;
      d.open = false;
      d.dataset.saCollapsed = '1';
    });
  }

  function attachBehavior() {
    const webchatEl = document.getElementById('webchat');
    const observer = new MutationObserver(() => {
      const input = webchatEl.querySelector('input[type="text"], textarea');
      if (input && !sendInput) {
        sendInput = input;
        wireIOSKeyboardFix(input, webchatEl);
      }
      hookTypewriter(webchatEl);
      collapseCitations(webchatEl);
    });
    observer.observe(webchatEl, { childList: true, subtree: true });
  }

  /* =========================================================================
     iOS KEYBOARD REFOCUS FIX
     ---------------------------------------------------------------------------
     On iOS Safari/Chrome, the soft keyboard only opens via .focus() if the call
     happens *inside a user gesture handler* (touchend/click). Web Chat blurs
     the textarea after sending a message, so subsequent taps on the input
     can fail to reopen the keyboard. Fix: capture touchend on the send-box
     container and synchronously focus the textarea — same gesture, same focus.
     ========================================================================= */
  function wireIOSKeyboardFix(input, webchatEl) {
    if (input.dataset.iosFixed === '1') return;
    input.dataset.iosFixed = '1';

    const sendBox = webchatEl.querySelector('.webchat__send-box, .webchat__send-box-text-box') || input.parentElement;
    if (!sendBox) return;

    // Tap-to-focus: works inside the iOS user gesture
    sendBox.addEventListener('touchend', (e) => {
      // Don't steal focus from the send button itself
      if (e.target.closest('button')) return;
      // Only refocus if we're not already focused
      if (document.activeElement !== input) {
        // Focus must run synchronously inside the gesture for iOS
        input.focus();
      }
    }, { passive: true });

    // After sending, refocus the input so the keyboard stays open for the
    // user's next message. We do this on Enter/click of the send button.
    const sendBtn = webchatEl.querySelector('.webchat__send-button, button[title="Send"]');
    if (sendBtn) {
      sendBtn.addEventListener('click', () => {
        // iOS needs the focus call inside the same gesture frame
        requestAnimationFrame(() => input.focus());
      });
    }
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        // Enter sends — refocus to keep keyboard up
        requestAnimationFrame(() => input.focus());
      }
    });
  }

  function wireThinkingTriggers() {
    // We do NOT fire fadeEmpty/showThinking on keydown anymore — that caused the
    // empty state to flash away on any typing. We fade only when a message is
    // actually sent, which we detect by watching the DOM for a user bubble.
  }

  function wireChips() {
    document.querySelectorAll('.chip[data-prompt]').forEach(chip => {
      if (chip.dataset.wired === '1') return;
      chip.dataset.wired = '1';
      chip.addEventListener('click', () => {
        const prompt = chip.getAttribute('data-prompt');
        const webchatEl = document.getElementById('webchat');
        const input = webchatEl.querySelector('input[type="text"], textarea');
        if (!input) { setTimeout(wireChips, 300); return; }
        const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value')?.set
                          || Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value')?.set;
        nativeSetter?.call(input, prompt);
        input.dispatchEvent(new Event('input', { bubbles: true }));
        // Submit: send button is title="Send" + class webchat__send-button
        const btn = webchatEl.querySelector('.webchat__send-button, button[title="Send"]');
        if (btn) btn.click();
        else {
          // fallback: dispatch Enter
          input.focus();
          input.dispatchEvent(new KeyboardEvent('keydown', {key: 'Enter', bubbles: true}));
        }
        // Optimistic UI hints — actual fade now happens when user bubble renders
        showThinking();
      });
    });
  }

  // Watch for user messages actually appearing in the transcript — that's the
  // true signal that a send happened (covers Enter key, send button, and chips).
  let userMsgWatcher = null;
  let lastUserBubbleCount = 0;
  function watchForUserMessages() {
    const webchatEl = document.getElementById('webchat');
    userMsgWatcher = new MutationObserver(() => {
      const userBubbles = webchatEl.querySelectorAll('.webchat__bubble--from-user');
      // Any user bubble present? Fade the empty state.
      if (userBubbles.length) {
        fadeEmpty();
      }
      // NEW user bubble appeared since last check? Scroll to bottom.
      if (userBubbles.length > lastUserBubbleCount) {
        lastUserBubbleCount = userBubbles.length;
        scrollToBottomForUserSend();
      }
      // Detect the FIRST user message to seed a conversation title.
      // Try several selectors — Web Chat renders user text as either markdown
      // or plain text depending on activity type. Fall back to bubble textContent.
      let firstUserText = '';
      const userBubble = webchatEl.querySelector('.webchat__bubble--from-user');
      if (userBubble) {
        const md = userBubble.querySelector('.webchat__text-content__markdown, .webchat__render-markdown');
        firstUserText = (md?.textContent || userBubble.textContent || '').trim();
      }
      if (firstUserText && !getConvTitled()) {
        seedConvTitle(firstUserText);
      }
      // Show thinking indicator whenever the newest activity is from the user
      // and no bot reply has arrived yet.
      const activities = [...webchatEl.querySelectorAll('.webchat__basic-transcript__activity')];
      if (activities.length) {
        const last = activities[activities.length - 1];
        const lastIsUser = !!last.querySelector('.webchat__bubble--from-user');
        if (lastIsUser) showThinking();
      }
    });
    userMsgWatcher.observe(webchatEl, { childList: true, subtree: true });
  }

  // Track whether we've already titled this conversation
  let convTitled = false;
  function getConvTitled() { return convTitled; }
  function seedConvTitle(firstMessage) {
    if (convTitled) return;
    convTitled = true;
    const id = currentConvId || ('conv-' + Date.now() + '-' + Math.random().toString(36).slice(2,8));
    currentConvId = id;
    setActiveConvId(id);
    const title = firstMessage.length > 48 ? firstMessage.slice(0, 48).trim() + '…' : firstMessage;
    upsertConv({ id, title, firstUserMsg: firstMessage });
    // Re-render the sidebar so the new conversation appears immediately
    try { renderConvList(); } catch(_) {}
  }
  let currentConvId = null;

  /* =========================================================================
     INIT
     ========================================================================= */
  function autoReplayIfPending() {
    const raw = sessionStorage.getItem('sa.replay');
    if (!raw) return;
    sessionStorage.removeItem('sa.replay');
    try {
      const { id, text } = JSON.parse(raw);
      if (!text) return;
      currentConvId = id || currentConvId;
      convTitled = true; // don't re-title; title already exists
      // Wait for the input to exist, then fire.
      const tryFire = () => {
        const webchatEl = document.getElementById('webchat');
        const input = webchatEl.querySelector('input[type="text"], textarea');
        if (!input) { setTimeout(tryFire, 200); return; }
        const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value')?.set
                          || Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value')?.set;
        nativeSetter?.call(input, text);
        input.dispatchEvent(new Event('input', { bubbles: true }));
        const btn = webchatEl.querySelector('.webchat__send-button, button[title="Send"]');
        if (btn) btn.click();
        showThinking();
      };
      setTimeout(tryFire, 600);
    } catch {}
  }

  async function initWebChat() {
    // Fresh-start behavior: every page load begins with the welcome screen
    // and a brand-new Direct Line conversation. Prior conversations live in
    // the sidebar. The only exception is a "replay" — the user clicked a
    // sidebar row, so we re-fire their original question (handled below).
    const replayPending = !!sessionStorage.getItem('sa.replay');
    if (!replayPending) {
      // No replay queued → clear any lingering active id so nothing is
      // highlighted in the sidebar until the user actually starts a new one.
      setActiveConvId(null);
      currentConvId = null;
    } else {
      currentConvId = getActiveConvId();
    }
    // Render sidebar immediately so the user sees it even while token fetches
    renderConvList();
    renderFoot();
    updateGreeting();
    try {
      const res = await fetch(tokenEndpoint);
      const { token } = await res.json();
      const directLine = window.WebChat.createDirectLine({ token });
      directLineRef = directLine;
      window.WebChat.renderWebChat({ directLine, styleOptions }, document.getElementById('webchat'));
      attachBehavior();
      ensureThinkingEl();
      watchForUserMessages();
      setupScrollControl();
      // chip wiring after the input exists
      setTimeout(wireChips, 400);
      // Replay a prior question if the user clicked a sidebar entry.
      // This also hides the welcome screen since a user message will appear.
      autoReplayIfPending();
    } catch (err) {
      console.error('WebChat init failed:', err);
      document.getElementById('webchat').innerHTML =
        '<p style="padding:20px;text-align:center;color:#DA2037;font-family:Inter,sans-serif;">Unable to load chat. Please refresh the page.</p>';
    }
  }

  initWebChat();

  // New conversation button
  document.getElementById('new-chat-btn').addEventListener('click', () => {
    startNewConv();
  });

  /* =========================================================================
     SCROLL CONTROL — disable Web Chat's aggressive auto-scroll-to-bottom
     ---------------------------------------------------------------------------
     react-scroll-to-bottom (RSTB) snaps the transcript to the bottom on every
     DOM mutation, which makes streaming responses jittery and unreadable when
     you scroll up. Strategy:
       1. Make ALL programmatic scrolling on the transcript a no-op. The user
          drives the scrollbar, period.
       2. When the USER sends a new message, do ONE smooth scroll-to-bottom so
          they see the bot's reply start.
       3. If the user is already at the bottom when bot tokens stream in, they
          stay at the bottom naturally because nothing pushes content above
          them — the new tokens just extend the page below their viewport.
          (Wait — that's not quite right; the bubble is at the bottom, so if
          they're scrolled to bottom and content grows, they DO need to follow.
          We handle that case below with a "follow tail" mode.)
       4. Show a "Jump to latest" pill when they're scrolled up.
     ========================================================================= */
  let scrollEl = null;
  let userAwayFromBottom = false;
  let followTail = true;     // true = auto-scroll bot tokens into view; flips false on user scroll-up
  const NEAR_BOTTOM_PX = 80;

  function isNearBottom(el) {
    return (el.scrollHeight - el.scrollTop - el.clientHeight) <= NEAR_BOTTOM_PX;
  }

  function setupScrollControl() {
    const webchatEl = document.getElementById('webchat');
    const pill = document.getElementById('jump-latest');

    function tryAttach() {
      const el = webchatEl.querySelector('.webchat__basic-transcript__scrollable');
      if (!el || el === scrollEl) return;
      scrollEl = el;

      // -- HIJACK: kill ALL programmatic scrollTop sets that target the bottom.
      // RSTB uses requestAnimationFrame loops to set scrollTop repeatedly; we
      // just refuse those when the user has indicated they want to read.
      const proto = Object.getPrototypeOf(el);
      const desc  = Object.getOwnPropertyDescriptor(proto, 'scrollTop')
                || Object.getOwnPropertyDescriptor(Element.prototype, 'scrollTop');
      const origSet = desc.set;
      const origGet = desc.get;
      if (!el.__saScrollHijacked) {
        Object.defineProperty(el, 'scrollTop', {
          configurable: true,
          get() { return origGet.call(this); },
          set(v) {
            // Allow our own deliberate scrolls (we set followTail=true around them)
            if (el.__saAllowSet) { origSet.call(this, v); return; }
            // If user is following the tail, pass through bottom-targeting writes
            if (followTail) { origSet.call(this, v); return; }
            // Otherwise: ignore writes that try to land at/near the bottom (auto-snap)
            const targetIsBottom = v >= (this.scrollHeight - this.clientHeight - 4);
            if (targetIsBottom) return;
            origSet.call(this, v);
          }
        });
        el.__saScrollHijacked = true;
      }
      // Also intercept scrollTo / scrollBy
      const origScrollTo = el.scrollTo.bind(el);
      el.scrollTo = function(...args) {
        if (el.__saAllowSet || followTail) return origScrollTo(...args);
        // Block bottom-targeting calls
        const top = typeof args[0] === 'object' ? args[0].top : args[1];
        if (top != null && top >= (el.scrollHeight - el.clientHeight - 4)) return;
        return origScrollTo(...args);
      };

      // Detect user scroll intent
      let userInteracting = false;
      const markUser = () => { userInteracting = true; setTimeout(()=>{ userInteracting=false; }, 800); };
      el.addEventListener('wheel',     markUser, { passive: true });
      el.addEventListener('touchstart',markUser, { passive: true });
      el.addEventListener('keydown', (e) => {
        if (['PageUp','PageDown','ArrowUp','ArrowDown','Home','End',' '].includes(e.key)) markUser();
      });

      el.addEventListener('scroll', () => {
        const near = isNearBottom(el);
        if (userInteracting) {
          userAwayFromBottom = !near;
          followTail = near;       // user scrolled to bottom themselves -> resume following
        } else if (near && !userAwayFromBottom) {
          // We programmatically arrived at bottom (e.g. via "send")
          followTail = true;
        }
        pill.classList.toggle('show', userAwayFromBottom);
      });
    }

    const obs = new MutationObserver(tryAttach);
    obs.observe(webchatEl, { childList: true, subtree: true });
    tryAttach();

    // Pill click → jump to bottom and resume following
    pill.addEventListener('click', () => {
      if (!scrollEl) return;
      userAwayFromBottom = false;
      followTail = true;
      pill.classList.remove('show');
      scrollEl.__saAllowSet = true;
      scrollEl.scrollTo({ top: scrollEl.scrollHeight, behavior: 'smooth' });
      setTimeout(() => { scrollEl.__saAllowSet = false; }, 600);
    });
  }

  // Called from the user-message watcher: when user sends a new message, force
  // a smooth scroll-to-bottom so they see their own bubble + start of reply.
  function scrollToBottomForUserSend() {
    if (!scrollEl) return;
    userAwayFromBottom = false;
    followTail = true;
    document.getElementById('jump-latest')?.classList.remove('show');
    scrollEl.__saAllowSet = true;
    scrollEl.scrollTo({ top: scrollEl.scrollHeight, behavior: 'smooth' });
    setTimeout(() => { scrollEl.__saAllowSet = false; }, 600);
  }

  /* =========================================================================
     MOBILE SIDEBAR TOGGLE
     ========================================================================= */
  function openSidebar()  { document.body.classList.add('sidebar-open'); }
  function closeSidebar() { document.body.classList.remove('sidebar-open'); }
  document.getElementById('sidebar-toggle').addEventListener('click', openSidebar);
  document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
  document.getElementById('sidebar-scrim').addEventListener('click', closeSidebar);
  // Close sidebar after picking a conversation or starting a new one (mobile UX)
  document.getElementById('conv-list').addEventListener('click', (e) => {
    if (e.target.closest('.conv')) closeSidebar();
  });
  document.getElementById('new-chat-btn').addEventListener('click', closeSidebar);
  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.body.classList.contains('sidebar-open')) closeSidebar();
  });
</script>
</body>
